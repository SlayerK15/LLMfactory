use_default_settings: true

general:
  debug: false
  instance_name: "collection-searxng"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120

server:
  secret_key: "collection-system-secret-change-in-prod"
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true

engines:
  - name: google
    engine: google
    shortcut: g
    timeout: 10.0
    disabled: false
  - name: bing
    engine: bing
    shortcut: b
    timeout: 10.0
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    timeout: 10.0
    disabled: false
  - name: wikipedia
    engine: wikipedia
    shortcut: w
    timeout: 10.0
    disabled: false

outgoing:
  request_timeout: 10.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
