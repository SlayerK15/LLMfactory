[app]
log_level = "INFO"
metrics_port = 8001
data_dir = "./data"

[query_agent]
provider = "groq"
model = "llama-3.3-70b-versatile"
fallback_provider = "ollama"
fallback_model = "qwen2.5:7b"
max_depth = 3
max_queries = 600
relevance_threshold = 0.5
batch_size = 20

[search]
backends = ["cc_cdx", "searxng"]

[search.cc_cdx]
enabled = true
index = "CC-MAIN-2026-12"
max_urls_per_query = 20

[search.searxng]
enabled = true
base_url = "http://searxng:8888"
rate_per_second = 2.0
circuit_breaker_failures = 5
circuit_breaker_cooldown_s = 60
timeout_s = 10

[search.ddg_lite]
enabled = false

[scraper]
concurrency = 40
per_url_timeout_s = 30
js_render = "auto"
retry_attempts = 3
retry_backoff_base_s = 2.0

[reliability]
global_timeout_s = 1800
stage_timeout_query_s = 120
stage_timeout_discovery_s = 300
stage_timeout_scrape_s = 1200
