[tool.uv.workspace]
members = ["collection-system", "cleaning-system"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "e2e: end-to-end tests requiring real services (postgres, groq, internet)",
    "slow: tests that take more than a few seconds",
]

[tool.ruff]
target-version = "py313"
line-length = 100
